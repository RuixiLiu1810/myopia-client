<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>近视预测临床系统</title>
  <link rel="stylesheet" href="/doctor-static/styles.css" />
</head>
<body>

<!-- ===== Login Screen ===== -->
<div id="login-screen" class="login-screen">
  <div class="login-orb login-orb-1"></div>
  <div class="login-orb login-orb-2"></div>
  <div class="login-orb login-orb-3"></div>
  <div class="login-wrap">
    <div class="login-hero">
      <div class="login-eye-icon">
        <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="24" cy="24" rx="20" ry="11"/>
          <circle cx="24" cy="24" r="7" fill="currentColor" opacity=".18" stroke="none"/>
          <circle cx="24" cy="24" r="4" fill="currentColor" stroke="none"/>
          <circle cx="21.5" cy="21.5" r="1.5" fill="white" opacity=".75" stroke="none"/>
          <path d="M4 24 C10 14, 38 14, 44 24" stroke-dasharray="3 0"/>
        </svg>
      </div>
      <h1>近视预测临床系统</h1>
      <p>基于眼底图像与球镜当量的 AI 辅助预测平台</p>
    </div>
    <div class="login-card">
      <div class="login-card-title">医生登录</div>
      <form id="login-form" autocomplete="on">
        <div class="login-field">
          <label for="login-username">用户名</label>
          <input id="login-username" type="text" class="login-input" placeholder="请输入用户名" required autocomplete="username" />
        </div>
        <div class="login-field">
          <label for="login-password">密码</label>
          <input id="login-password" type="password" class="login-input" placeholder="请输入密码" required autocomplete="current-password" />
        </div>
        <div id="login-error" class="login-error hidden"></div>
        <button type="submit" id="login-submit" class="btn-login">
          <span id="login-submit-text">登 录</span>
          <span id="login-spinner" class="spinner hidden"></span>
        </button>
        <div class="login-tools">
          <button type="button" id="login-conn-settings" class="login-link-btn">连接设置</button>
          <span class="login-tools-hint">当前：<code id="login-api-base-preview">/api</code></span>
        </div>
      </form>
    </div>
    <p class="login-footer">仅供科研与临床用途 · v2.0</p>
  </div>
</div>

<!-- ===== App Shell ===== -->
<div id="app-shell" class="app-shell hidden">

  <!-- ===== Topbar ===== -->
  <header class="topbar">
    <div class="topbar-start">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          id="global-search"
          type="text"
          class="search-input"
          placeholder="搜索患者姓名或编号…"
          autocomplete="off"
        />
      </div>
    </div>

    <div class="topbar-end">
      <span id="status-badge" class="status-badge status-checking">
        <span class="status-dot"></span>
        <span id="status-text">检测中…</span>
      </span>
    </div>
  </header>

  <!-- ===== Sidebar ===== -->
  <nav id="sidebar" class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="12" cy="12" rx="10" ry="5.5"/>
          <circle cx="12" cy="12" r="2.5" fill="currentColor" stroke="none"/>
          <path d="M2 12 C6 5, 18 5, 22 12"/>
        </svg>
      </div>
      <span class="sidebar-brand-name">近视预测</span>
    </div>
    <div class="nav-section-title">菜单</div>
    <ul class="nav-list">
      <li>
        <a class="nav-item" data-route="/dashboard" href="#/dashboard">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
          <span class="nav-label">仪表盘</span>
        </a>
      </li>
      <li>
        <a class="nav-item" data-route="/patients" href="#/patients">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/><line x1="19" y1="8" x2="23" y2="8"/><line x1="21" y1="6" x2="21" y2="10"/></svg></span>
          <span class="nav-label">患者管理</span>
        </a>
      </li>
      <li>
        <a class="nav-item" data-route="/encounters" href="#/encounters">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
          <span class="nav-label">就诊记录</span>
        </a>
      </li>
      <li>
        <a class="nav-item" data-route="/predict" href="#/predict">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>
          <span class="nav-label">预测工具</span>
        </a>
      </li>
    </ul>
    <div class="nav-section-title">工具</div>
    <ul class="nav-list">
      <li>
        <a class="nav-item" data-route="/system" href="#/system">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
          <span class="nav-label">系统设置</span>
        </a>
      </li>
    </ul>
    <div class="sidebar-spacer"></div>
    <div id="user-info" class="sidebar-user hidden">
      <div class="sidebar-user-avatar" id="user-avatar">U</div>
      <div class="sidebar-user-detail">
        <span id="user-display-name" class="sidebar-user-name"></span>
        <span id="user-role-badge" class="role-badge"></span>
      </div>
      <button id="logout-btn" class="icon-btn" title="退出登录">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M7 17H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h3"/><polyline points="11 15 15 10 11 5"/><line x1="15" y1="10" x2="6" y2="10"/></svg>
      </button>
    </div>
  </nav>

  <!-- ===== Content Area ===== -->
  <main id="content-area" class="content-area">
    <div class="content-loading">
      <div class="spinner-lg"></div>
      <p>加载中…</p>
    </div>
  </main>

</div>

<!-- ===== Modal Root ===== -->
<div id="modal-root"></div>

<!-- ===== Toast Root ===== -->
<div id="toast-root" class="toast-root"></div>

<script src="/doctor-static/app.js"></script>
</body>
</html>
